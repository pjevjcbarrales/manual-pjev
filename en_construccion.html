<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página en Construcción</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { padding: 40px; background: var(--pjev-crema); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; box-sizing: border-box; }
  .construction-box { text-align: center; background: #fff; padding: 40px; border-radius: 12px; border: 1px dashed #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; }
  .construction-icon { font-size: 60px; margin-bottom: 20px; }
  .construction-title { font-size: 24px; color: var(--pjev-verde-oscuro); margin-bottom: 10px; font-weight: bold; }
  .construction-text { color: var(--pjev-texto-muted); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="construction-box">
    <div class="construction-icon">🚧</div>
    <div class="construction-title">Módulo en Desarrollo</div>
    <div class="construction-text">El Análisis Funcional (DOC-08) para este módulo aún no ha sido integrado a la documentación. Próximamente estará disponible en el manual.</div>
  </div>
</body>
</html>
